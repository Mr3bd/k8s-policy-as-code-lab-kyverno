apiVersion: v1
kind: Pod
metadata:
  name: good-pod
spec:
  securityContext:
    runAsNonRoot: true
  containers:
    - name: nginx
      image: docker.io/nginx
      resources:
        limits:
          memory: "128Mi"
          cpu: "100m"
      readinessProbe:
        httpGet:
          path: /
          port: 80
      securityContext:
        capabilities:
          drop:
            - ALL