apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-hostpath
spec:
  validationFailureAction: Enforce
  rules:
    - name: block-hostpath
      match:
        any:
        - resources:
            kinds:
              - Pod
      validate:
        message: "hostPath volumes are not allowed"
        pattern:
          spec:
            volumes:
              - name: "?*"
                =(hostPath): "null"